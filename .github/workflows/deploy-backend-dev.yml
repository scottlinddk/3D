name: Deploy Backend — Development

on:
  push:
    branches: [development]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend-dev.yml"

jobs:
  deploy:
    name: Deploy to Raspberry Pi (dev)
    runs-on: [self-hosted, rpi]
    environment: development
    concurrency:
      group: deploy-dev
      cancel-in-progress: true

    steps:
      - name: Pull latest code
        run: |
          cd ~/curveextract/dev
          git fetch origin development
          git reset --hard origin/development

      - name: Install / update dependencies
        run: |
          cd ~/curveextract/dev
          .venv/bin/pip install -q --upgrade pip
          .venv/bin/pip install -q -r backend/requirements.txt

      - name: Initialise database
        run: |
          cd ~/curveextract/dev/backend
          if grep -R -n "/tmp/curve_extraction" app; then
            echo "::error::Backend storage still uses hard-coded /tmp/curve_extraction paths and does not support CURVEEXTRACT_DATA_DIR. Refusing to deploy a dev instance that would share DB/uploads with other environments."
            exit 1
          fi
          ../.venv/bin/python -c "from app.storage.db import init_db; init_db()"

      - name: Restart service
        run: sudo systemctl restart curveextract-dev

      - name: Health check
        run: |
          sleep 3
          curl -sf http://localhost:8001/health | python3 -c \
            "import sys,json; d=json.load(sys.stdin); sys.exit(0 if d.get('status')=='ok' else 1)"
