name: Deploy Backend — Production

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend-prod.yml"

jobs:
  deploy:
    name: Deploy to Raspberry Pi (prod)
    runs-on: [self-hosted, rpi]
    environment: production
    concurrency:
      group: deploy-prod
      cancel-in-progress: false

    steps:
      - name: Pull latest code
        run: |
          cd ~/curveextract/prod
          git fetch origin main
          git reset --hard origin/main

      - name: Install / update dependencies
        run: |
          cd ~/curveextract/prod
          .venv/bin/pip install -q --upgrade pip
          .venv/bin/pip install -q -r backend/requirements.txt

      - name: Initialise database
        run: |
          cd ~/curveextract/prod/backend
          CURVEEXTRACT_DATA_DIR=/var/lib/curveextract/prod \
            ../.venv/bin/python -c "from app.storage.db import init_db; init_db()"

      - name: Restart service
        run: sudo systemctl restart curveextract-prod

      - name: Health check
        run: |
          sleep 3
          curl -sf http://localhost:8000/health | python3 -c \
            "import sys,json; d=json.load(sys.stdin); sys.exit(0 if d.get('status')=='ok' else 1)"
